<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BiliTogether</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">BiliTogether</p>
          <h1>一起看 B 站</h1>
          <p class="subtitle"></p>
        </div>
        <div class="hero-status">
          <span id="connectionStatus" class="status-pill neutral">未连接</span>
          <p id="sessionMeta" class="status-copy">先选择你是房主还是加入方。</p>
        </div>
      </section>

      <section class="mode-switch">
        <button id="hostModeButton" class="mode-button active" type="button">我是房主</button>
        <button id="guestModeButton" class="mode-button" type="button">我要加入</button>
      </section>

      <section id="hostPanel" class="flow-panel">
        <div class="flow-head">
          <p class="flow-step">Step 1</p>
          <h2>创建连接码</h2>
        </div>
        <p class="flow-copy">点击一次生成，把连接码发给对方即可。</p>
        <button id="createInviteButton" class="primary-button" type="button">生成连接码</button>
        <label class="field">
          <span>我的连接码</span>
          <textarea id="inviteOutput" rows="6" readonly placeholder="生成后会显示在这里"></textarea>
        </label>
        <button id="copyInviteButton" class="secondary-button" type="button">复制连接码</button>

        <div class="flow-head flow-head-secondary">
          <p class="flow-step">Step 2</p>
          <h2>贴回确认码</h2>
        </div>
        <p class="flow-copy">对方加入后会发回一段确认码，你贴回来就完成连接。</p>
        <label class="field">
          <span>对方确认码</span>
          <textarea id="responseInput" rows="6" placeholder="把对方发回来的确认码粘贴到这里"></textarea>
        </label>
        <button id="completeHandshakeButton" class="secondary-button" type="button">完成连接</button>
      </section>

      <section id="guestPanel" class="flow-panel hidden">
        <div class="flow-head">
          <p class="flow-step">Step 1</p>
          <h2>贴入连接码</h2>
        </div>
        <p class="flow-copy">把房主发来的连接码贴进来，立即生成你的确认码。</p>
        <label class="field">
          <span>房主连接码</span>
          <textarea id="inviteInput" rows="6" placeholder="把房主发来的连接码粘贴到这里"></textarea>
        </label>
        <button id="acceptInviteButton" class="primary-button" type="button">生成确认码</button>

        <div class="flow-head flow-head-secondary">
          <p class="flow-step">Step 2</p>
          <h2>发回确认码</h2>
        </div>
        <p class="flow-copy">把生成后的确认码发给房主，等待对方点完成连接。</p>
        <label class="field">
          <span>我的确认码</span>
          <textarea id="responseOutput" rows="6" readonly placeholder="生成后会显示在这里"></textarea>
        </label>
        <button id="copyResponseButton" class="secondary-button" type="button">复制确认码</button>
      </section>

      <section class="session-strip">
        <div class="session-copy">
          <p class="session-label">当前会话</p>
          <p id="remotePeer" class="session-peer">尚未连接对方</p>
        </div>
        <div class="session-actions">
          <button id="openBilibiliButton" class="secondary-button" type="button">打开 B 站</button>
          <button id="resetSessionButton" class="ghost-button" type="button">重置</button>
        </div>
      </section>

      <section id="errorPanel" class="error-panel hidden"></section>
    </main>

    <script src="../shared/constants.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
