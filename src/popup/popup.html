<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BiliTogether</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">BiliTogether</p>
          <h1>一起看 B 站</h1>
        </div>
        <div class="hero-status">
          <span id="connectionStatus" class="status-pill neutral">未连接</span>
          <p id="sessionMeta" class="status-copy">分享房间号，快速一起看。</p>
        </div>
      </section>

      <!-- 首页：创建 or 加入 -->
      <section id="homePanel" class="home-panel">
        <button id="createRoomBtn" class="primary-button full-button" type="button">创建房间</button>
        <div class="divider"><span>或</span></div>
        <label class="field">
          <span>输入房间号加入</span>
          <input id="roomIdInput" type="text" placeholder="例如: BT7X9K" maxlength="8" />
        </label>
        <button id="joinRoomBtn" class="secondary-button full-button" type="button">加入房间</button>
      </section>

      <!-- Host 等待 -->
      <section id="hostPanel" class="flow-panel hidden">
        <div class="room-id-display">
          <p class="room-id-label">房间号</p>
          <p id="roomIdDisplay" class="room-id-value">——</p>
        </div>
        <p class="hint-text">把这个房间号发给他人，对方输入即可加入。</p>
        <button id="copyRoomIdBtn" class="primary-button full-button" type="button">复制房间号</button>
        <p id="hostHint" class="wait-hint">等待对方加入...</p>
      </section>

      <!-- Guest 加入中 -->
      <section id="guestPanel" class="flow-panel hidden">
        <p class="hint-text">正在加入房间...</p>
        <p id="joiningRoomId" class="joining-room-id">——</p>
      </section>

      <!-- 已连接 -->
      <section id="connectedPanel" class="flow-panel connected-panel hidden">
        <div class="connected-badge">
          <span class="connected-icon">✓</span>
          <span>已连接</span>
        </div>
        <p id="peerName" class="peer-name"></p>
        <p class="hint-text">去 B 站打开视频，播放会自动同步。</p>
      </section>

      <!-- 错误 -->
      <section id="errorPanel" class="error-panel hidden"></section>

      <!-- 底部操作 -->
      <section class="session-strip">
        <div class="session-actions">
          <button id="openBilibiliButton" class="secondary-button" type="button">打开 B 站</button>
          <button id="resetSessionButton" class="ghost-button" type="button">重置</button>
        </div>
      </section>
    </main>

    <script src="../shared/constants.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
